{% extends 'base.html' %}

{% block content %}
<div class="auth-box">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn primary">Login</button>
    </form>
    <a href="{% url 'users:signup' %}" class="link">Sign Up</a>
</div>
{% endblock %}
