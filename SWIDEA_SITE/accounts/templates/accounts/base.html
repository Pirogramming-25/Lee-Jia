{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>My SW Idea Manage</title>
  <link rel="stylesheet" type="text/css" href="{% url 'accounts:main_css' %}">
</head>
<body>
  <nav>
    <a class="brand" href="{% url 'ideas:list' %}">My SW Idea Manage</a>
    <a href="{% url 'ideas:create' %}">아이디어 등록</a>
    <a href="{% url 'ideas:list' %}">아이디어 관리</a>
    <a href="{% url 'devtools:create' %}">개발툴 등록</a>
    <a href="{% url 'devtools:list' %}">개발툴 관리</a>
    {% if user.is_authenticated %}
      <form method="post" action="{% url 'accounts:logout' %}" class="logout-form">
        {% csrf_token %}
        <button type="submit" class="btn btn-list">로그아웃</button>
      </form>
    {% else %}
      <a href="{% url 'accounts:login' %}">로그인</a>
    {% endif %}
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
